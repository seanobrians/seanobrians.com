<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a0a12">
  <title>Sean O'Brian's - Drinks Menu</title>
  <link rel="manifest" href="manifest.json">

  <!-- Fuentes: preload async para no bloquear render -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap">
  </noscript>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="top-actions" aria-label="Language">
        <button class="lang-button" type="button" data-lang="es" aria-pressed="true">ES</button>
        <button class="lang-button" type="button" data-lang="en" aria-pressed="false">EN</button>
      </div>

      <img class="triskel" src="/logoTransparente.svg" alt="Sean O'Brian's logo" aria-hidden="true">

      <h1 class="pub-name">Sean O'Brian's</h1>
      <div class="pub-subtitle">IRISH PUB</div>
      <p class="menu-title" data-i18n="menuTitle">Drinks Menu</p>
      <div class="header-rule"><span></span><i></i><span></span></div>
    </header>

    <main class="view" id="menu-view" aria-live="polite"></main>

    <footer>
      <div class="ornament-rule"><span></span><i></i><span></span></div>
      <p class="footer-text">SLÁINTE · SALUD · CHEERS</p>
    </footer>
  </div>

  <nav class="bottom-nav" aria-label="Menu categories">
    <div class="nav-scroll" id="category-nav"></div>
  </nav>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
